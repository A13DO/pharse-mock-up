<div hlmSidebarWrapper>
    <hlm-sidebar class="border-r-[rgb(226,226,226)]">
        <div hlmSidebarHeader class="px-6 py-8 border-b border-b-[rgb(226,226,226)]">
            <h1 class="text-2xl font-bold text-slate-900">Phrase TMS</h1>
            <p class="text-sm text-gray-500 mt-1">API Client</p>
        </div>

        <div *ngIf="!hasToken"
            class="bg-amber-50 text-amber-800 px-6 py-3 text-sm border-b border-amber-200 flex items-center gap-2">
            <ng-icon hlm name="lucideAlertTriangle" size="sm" />
            <span>No API token set</span>
        </div>

        <div hlmSidebarContent class="border-b-[rgb(226,226,226)]">
            <div hlmSidebarGroup>
                <div hlmSidebarGroupLabel class="border-b border-b-[rgb(226,226,226)]">Navigation</div>
                <div hlmSidebarGroupContent>
                    <ul hlmSidebarMenu>
                        @for(item of menuItems; track item.path){
                        <li hlmSidebarMenuItem>
                            <a hlmSidebarMenuButton [routerLink]="item.path"
                                routerLinkActive="bg-indigo-50 text-[#0f172b] font-semibold">
                                <ng-icon hlm [name]="item.icon" />
                                <span>{{ item.label }}</span>
                            </a>
                        </li>
                        }
                    </ul>
                </div>
            </div>
        </div>

        <!-- User Info and Logout at Bottom -->
        <div hlmSidebarFooter class="border-t border-t-[rgb(226,226,226)] p-4">
            @if (currentUser) {
            <div class="mb-3 px-2">
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                        <ng-icon hlm name="lucideUser" size="sm" class="text-indigo-600" />
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-slate-900 truncate">
                            {{ currentUser.firstName }} {{ currentUser.lastName }}
                        </p>
                        <p class="text-xs text-slate-500 truncate">{{ currentUser.email }}</p>
                    </div>
                </div>
            </div>
            }
            <button hlmBtn variant="outline" class="w-full justify-start" (click)="logout()">
                <ng-icon hlm name="lucideLogOut" />
                <span>Log Out</span>
            </button>
        </div>
    </hlm-sidebar>
    <ng-content />
</div>
