<app-header [breadcrumbs]="breadcrumbs()"></app-header>

<div class="p-4 md:p-6 mx-auto w-full">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 md:mb-6 gap-3 md:gap-4">
        <h3 class="text-lg md:text-xl font-semibold text-gray-900 m-0">All Projects</h3>
        <div class="flex gap-2 w-full sm:w-auto">
            <button
                class="h-9 px-3 bg-white text-slate-700 border border-slate-300 rounded-md font-medium text-sm inline-flex items-center justify-center gap-1.5 transition-colors hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed flex-1 sm:flex-none"
                (click)="refresh()" [disabled]="loading">
                <i class="pi pi-refresh text-xs"></i> <span class="hidden sm:inline">Refresh</span>
            </button>
            <a routerLink="/projects/create"
                class="h-9 px-3 bg-slate-900 text-white rounded-md font-medium text-sm inline-flex items-center justify-center gap-1.5 transition-colors hover:bg-slate-800 no-underline flex-1 sm:flex-none">
                <i class="pi pi-plus text-xs"></i> <span class="hidden sm:inline">Create New Project</span><span
                    class="sm:hidden">Create</span>
            </a>
        </div>
    </div>

    <div *ngIf="error"
        class="bg-red-50 border border-red-200 text-red-800 px-4 py-2.5 rounded-md mb-4 flex justify-between items-center text-sm">
        <div>
            <strong class="font-semibold">Error loading projects:</strong> {{ error }}
        </div>
        <button
            class="bg-transparent border-none text-2xl leading-none cursor-pointer text-red-800 p-0 w-6 h-6 hover:opacity-70 transition-opacity"
            (click)="error = null">×</button>
    </div>

    <div>
        <app-data-table [columns]="columns" [tableData]="projects" [loading]="loading" [totalRecords]="projects.length"
            (viewRow)="onViewProject($event)"
            emptyMessage="No projects found. Create your first project to get started."></app-data-table>
    </div>
</div>
