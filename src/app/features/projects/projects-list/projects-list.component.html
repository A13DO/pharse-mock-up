<app-header>Projects</app-header>

<div class="p-8 max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
        <h3 class="text-2xl font-semibold text-gray-900 m-0">All Projects</h3>
        <div class="flex gap-3">
            <button
                class="px-5 py-2.5 bg-white text-gray-700 border border-gray-300 rounded-lg font-medium text-sm inline-flex items-center gap-2 transition-all duration-200 hover:bg-gray-50 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                (click)="refresh()" [disabled]="loading">
                <span class="text-lg">🔄</span> Refresh
            </button>
            <a routerLink="/projects/create"
                class="px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg font-medium text-sm inline-flex items-center gap-2 transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 no-underline">
                <span class="text-lg">➕</span> Create New Project
            </a>
        </div>
    </div>

    <div *ngIf="error"
        class="bg-red-50 border border-red-200 text-red-800 px-6 py-4 rounded-lg mb-6 flex justify-between items-center">
        <div>
            <strong class="font-semibold">Error loading projects:</strong> {{ error }}
        </div>
        <button
            class="bg-transparent border-none text-2xl leading-none cursor-pointer text-red-800 p-0 w-6 h-6 hover:opacity-70 transition-opacity"
            (click)="error = null">×</button>
    </div>

    <div>
        <app-data-table [columns]="columns" [tableData]="projects" [loading]="loading" [totalRecords]="projects.length"
            (viewRow)="onViewProject($event)"
            emptyMessage="No projects found. Create your first project to get started."></app-data-table>
    </div>
</div>
