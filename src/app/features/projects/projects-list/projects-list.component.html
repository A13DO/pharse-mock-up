<app-header>Projects</app-header>

<div class="p-6 max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <h3 class="text-xl font-semibold text-gray-900 m-0">All Projects</h3>
        <div class="flex gap-2">
            <button
                class="h-9 px-3 bg-white text-slate-700 border border-slate-300 rounded-md font-medium text-sm inline-flex items-center gap-1.5 transition-colors hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed"
                (click)="refresh()" [disabled]="loading">
                <i class="pi pi-refresh text-xs"></i> Refresh
            </button>
            <a routerLink="/projects/create"
                class="h-9 px-3 bg-slate-900 text-white rounded-md font-medium text-sm inline-flex items-center gap-1.5 transition-colors hover:bg-slate-800 no-underline">
                <i class="pi pi-plus text-xs"></i> Create New Project
            </a>
        </div>
    </div>

    <div *ngIf="error"
        class="bg-red-50 border border-red-200 text-red-800 px-4 py-2.5 rounded-md mb-4 flex justify-between items-center text-sm">
        <div>
            <strong class="font-semibold">Error loading projects:</strong> {{ error }}
        </div>
        <button
            class="bg-transparent border-none text-2xl leading-none cursor-pointer text-red-800 p-0 w-6 h-6 hover:opacity-70 transition-opacity"
            (click)="error = null">×</button>
    </div>

    <div>
        <app-data-table [columns]="columns" [tableData]="projects" [loading]="loading" [totalRecords]="projects.length"
            (viewRow)="onViewProject($event)"
            emptyMessage="No projects found. Create your first project to get started."></app-data-table>
    </div>
</div>
