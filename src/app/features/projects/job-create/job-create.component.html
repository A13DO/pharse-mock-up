<app-header>Create Job</app-header>

<div class="p-6 max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Create New Job</h1>
        <button routerLink="/projects"
            class="h-9 px-3 inline-flex items-center gap-1.5 rounded-md text-sm font-medium transition-colors border border-slate-300 bg-white hover:bg-slate-50">
            <i class="pi pi-arrow-left text-xs"></i> Back to Projects
        </button>
    </div>

    <!-- Error/Success Messages -->
    <div *ngIf="error" class="mb-6">
        <p-message severity="error" [text]="error" styleClass="w-full"></p-message>
    </div>

    <div *ngIf="success" class="mb-6">
        <p-message severity="success" [text]="success" styleClass="w-full"></p-message>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Form Section -->
        <div class="space-y-6">
            <p-card styleClass="shadow-sm">
                <ng-template pTemplate="header">
                    <div class="bg-slate-50 px-4 py-3 -m-6 mb-4 border-b border-slate-200">
                        <h2 class="text-sm font-semibold text-gray-900">Job Details</h2>
                    </div>
                </ng-template>

                <div class="space-y-3">
                    <!-- File Upload -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">
                            Source File <span class="text-red-500">*</span>
                        </label>
                        <p-fileUpload mode="basic" chooseLabel="Choose File" [auto]="false" [maxFileSize]="50000000"
                            (onSelect)="onFileSelect($event)" (onRemove)="onFileRemove()"
                            styleClass="w-full"></p-fileUpload>
                        <small class="text-gray-500" *ngIf="form.file">
                            Selected: {{ form.file.name }} ({{ (form.file.size / 1024).toFixed(2) }} KB)
                        </small>
                    </div>

                    <!-- Filename -->
                    <div class="flex flex-col gap-1.5">
                        <label for="filename" class="text-sm font-medium text-gray-700">
                            Filename <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="filename" [(ngModel)]="form.filename" placeholder="e.g., document.docx"
                            class="w-full" />
                        <small class="text-gray-500">Name to use in Content-Disposition header</small>
                    </div>

                    <!-- Target Languages -->
                    <div class="flex flex-col gap-1.5">
                        <label for="targetLangs" class="text-sm font-medium text-gray-700">
                            Target Languages <span class="text-red-500">*</span>
                        </label>
                        <p-multiSelect [options]="availableLanguages" [(ngModel)]="form.targetLangs"
                            placeholder="Select languages" optionLabel="label" optionValue="value" [showHeader]="false"
                            styleClass="w-full"></p-multiSelect>
                        <small class="text-gray-500">Languages for translation</small>
                    </div>
                </div>
            </p-card>

            <!-- Action Buttons -->
            <div class="flex gap-2 mt-6">
                <button (click)="onSubmit()" [disabled]="!isFormValid() || loading"
                    class="flex-1 h-9 px-4 inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-slate-900 text-white hover:bg-slate-800">
                    <span *ngIf="loading"
                        class="mr-1.5 h-3.5 w-3.5 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
                    {{ loading ? 'Creating...' : 'Create Job' }}
                </button>
                <button (click)="reset()" [disabled]="loading"
                    class="h-9 px-4 inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none border border-slate-300 bg-white hover:bg-slate-50">
                    Reset
                </button>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="space-y-6">
            <!-- Memsource Header Preview -->
            <p-card styleClass="shadow-sm">
                <ng-template pTemplate="header">
                    <div class="bg-slate-50 px-4 py-3 -m-6 mb-4 border-b border-slate-200">
                        <h2 class="text-sm font-semibold text-gray-900">Memsource Header Preview</h2>
                    </div>
                </ng-template>

                <!-- <div class="space-y-3">
                    <div class="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm overflow-x-auto">
                        <pre class="whitespace-pre-wrap">{{ memsourceHeaderPreview }}</pre>
                    </div>
                    <small class="text-gray-500 block">
                        This JSON will be sent in the <code class="bg-gray-100 px-1 py-0.5 rounded">Memsource</code>
                        header
                    </small>
                </div> -->
            </p-card>
        </div>
    </div>
</div>
