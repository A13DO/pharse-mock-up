<!-- Table -->
<div class="m-10">
    <p-table #dt [value]="tableData" [responsiveLayout]="'scroll'" [loading]="loading" class="w-full text-sm">
        <ng-template pTemplate="header">
            <tr class="text-[12px] font-medium leading-[120%] p-datatable-sortable-column text-nowrap">
                <th><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
                <th *ngFor="let col of columns"
                    [pSortableColumn]="col.sortable !== false ? getFieldName(col) : undefined"
                    [pSortableColumnDisabled]="col.sortable === false" class="px-4 py-3 text-left">
                    <ng-container *ngIf="getFieldName(col) !== 'actions'; else noSort">
                        <span>
                            {{ getHeaderName(col) }}
                            <p-sortIcon [field]="getFieldName(col)" *ngIf="col.sortable !== false"></p-sortIcon>
                        </span>
                    </ng-container>
                    <ng-template #noSort>
                        {{ getHeaderName(col) }}
                    </ng-template>
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-row>
            <tr class="hover:bg-light-hover cursor-pointer transition">
                <td class="px-4 py-2" (click)="$event.stopPropagation()">
                    <p-tableCheckbox [value]="row"></p-tableCheckbox>
                </td>

                <td *ngFor="let col of columns" class="text-nowrap">
                    @switch (getFieldName(col)) {
                    @case('actions') {
                    <div class="flex flex-row items-center gap-3">
                        <p-button label="View" variant="outlined" severity="help" styleClass="!text-sm"
                            (click)="onViewClick(row)"></p-button>
                    </div>
                    } @default {
                    <p>{{ getCellValue(row, col) }}</p>
                    } }
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td [attr.colspan]="columns.length + 1" class="text-center p-6">
                    <div class="text-gray-400 text-5xl mb-4">📁</div>
                    <p class="text-gray-500">{{ emptyMessage }}</p>
                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-paginator [rows]="rowsPerPage" [totalRecords]="totalRecords" [pageLinkSize]="5"
        [rowsPerPageOptions]="[10, 20, 50, 100]" (onPageChange)="onPageChange($event)" styleClass="mt-4"></p-paginator>
</div>
