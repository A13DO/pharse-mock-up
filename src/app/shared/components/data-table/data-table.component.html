<div class="relative w-full overflow-x-auto rounded-lg border border-gray-200 bg-white shadow-sm">
    <div *ngIf="loading" class="flex flex-col items-center justify-center p-12 gap-4">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-indigo-600 rounded-full animate-spin"></div>
        <p class="text-gray-500 text-sm">Loading...</p>
    </div>

    <table *ngIf="!loading && data.length > 0" class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th *ngFor="let column of columns"
                    class="px-6 py-4 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                    {{ column.label }}
                </th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            <tr *ngFor="let row of data" class="hover:bg-gray-50 transition-colors duration-150">
                <td *ngFor="let column of columns" class="px-6 py-4 text-sm text-gray-900">
                    {{ getCellValue(row, column) }}
                </td>
            </tr>
        </tbody>
    </table>

    <div *ngIf="!loading && data.length === 0" class="p-12 text-center">
        <div class="text-gray-400 text-5xl mb-4">📁</div>
        <p class="text-gray-500 text-base">{{ emptyMessage }}</p>
    </div>
</div>
