<!-- Table -->
<div class="bg-white border border-[#e5e7eb] rounded-lg shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
        <p-table #dt [value]="tableData" [responsiveLayout]="'scroll'" [loading]="loading" styleClass="w-full">
            <ng-template pTemplate="header">
                <tr class="bg-slate-50 border-b border-slate-200">
                    <!-- <th class="px-6 py-3">
                        <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                    </th> -->
                    <th *ngFor="let col of columns"
                        [pSortableColumn]="col.sortable !== false ? getFieldName(col) : undefined"
                        [pSortableColumnDisabled]="col.sortable === false"
                        class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">
                        <ng-container *ngIf="getFieldName(col) !== 'actions'; else noSort">
                            <span class="flex items-center gap-1">
                                {{ getHeaderName(col) }}
                                <p-sortIcon [field]="getFieldName(col)" *ngIf="col.sortable !== false"></p-sortIcon>
                            </span>
                        </ng-container>
                        <ng-template #noSort>
                            {{ getHeaderName(col) }}
                        </ng-template>
                    </th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-row>
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-200 last:border-0">
                    <!-- <td class="px-6 py-4" (click)="$event.stopPropagation()">
                        <p-tableCheckbox [value]="row"></p-tableCheckbox>
                    </td> -->

                    <td *ngFor="let col of columns" class="px-6 py-4 text-sm text-slate-900">
                        @switch (getFieldName(col)) {
                        @case('actions') {
                        <div class="flex flex-row items-center gap-2">
                            <p-button label="View" variant="outlined" severity="help" size="small"
                                styleClass="!text-xs !px-3 !py-1.5" (click)="onViewClick(row)"></p-button>
                        </div>
                        } @default {
                        <span>{{ getCellValue(row, col) }}</span>
                        } }
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td [attr.colspan]="columns.length + 1" class="px-6 py-8 text-center text-slate-500">
                        <i class="pi pi-folder-open text-slate-400 text-4xl mb-3 block"></i>
                        <p class="text-sm">{{ emptyMessage }}</p>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <div class="border-t border-slate-200">
        <p-paginator [rows]="rowsPerPage" [totalRecords]="totalRecords" [pageLinkSize]="5"
            [rowsPerPageOptions]="[10, 20, 50, 100]" (onPageChange)="onPageChange($event)"></p-paginator>
    </div>
</div>
