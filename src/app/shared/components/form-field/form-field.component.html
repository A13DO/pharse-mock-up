<div class="flex flex-col gap-2 mb-6">
    <label class="text-sm font-medium text-gray-700">
        {{ label }}
        <span *ngIf="required" class="text-red-500">*</span>
    </label>

    <input *ngIf="type !== 'textarea' && type !== 'checkbox'" [type]="type" [formControl]="control"
        [placeholder]="placeholder"
        [class]="'px-4 py-3 border rounded-lg text-sm transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent ' + (showError ? 'border-red-500 focus:ring-red-500' : 'border-gray-300')" />

    <textarea *ngIf="type === 'textarea'" [formControl]="control" [placeholder]="placeholder" rows="4"
        [class]="'px-4 py-3 border rounded-lg text-sm resize-y min-h-[80px] transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent ' + (showError ? 'border-red-500 focus:ring-red-500' : 'border-gray-300')"></textarea>

    <div *ngIf="type === 'checkbox'" class="flex items-center gap-2">
        <input type="checkbox" [formControl]="control" [id]="label"
            class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 cursor-pointer" />
        <label [for]="label" class="text-sm text-gray-700 cursor-pointer m-0 font-normal">{{ placeholder || label
            }}</label>
    </div>

    <div *ngIf="showError" class="text-red-500 text-xs">
        {{ errorMessage }}
    </div>
</div>
