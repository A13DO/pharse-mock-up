<div class="flex flex-col gap-1.5 mb-4">
    <label class="text-sm font-medium text-slate-700">
        {{ label }}
        <span *ngIf="required" class="text-red-500">*</span>
    </label>

    <input *ngIf="type !== 'textarea' && type !== 'checkbox'" hlmInput [type]="type" [formControl]="control"
        [placeholder]="placeholder" [class.border-red-500]="showError" />

    <textarea *ngIf="type === 'textarea'" hlmInput [formControl]="control" [placeholder]="placeholder" rows="3"
        class="resize-y min-h-[70px]" [class.border-red-500]="showError"></textarea>

    <div *ngIf="type === 'checkbox'" class="flex items-center gap-2">
        <hlm-checkbox [formControl]="control" [id]="label" />
        <label [for]="label" class="text-sm text-slate-700 cursor-pointer m-0 font-normal">{{ placeholder || label
            }}</label>
    </div>

    <div *ngIf="showError" class="text-red-500 text-xs">
        {{ errorMessage }}
    </div>
</div>
